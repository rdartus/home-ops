apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: network
  annotations:
    cert-manager.io/cluster-issuer: zerossl-prod
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.dartus.fr`)
      kind: Rule
      # middlewares:
      #   - name: authentik-forward-auth
      #     namespace: network
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: traefik.dartus.fr-tls
