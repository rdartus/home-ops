apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: crowdsec
  namespace: network
spec:
  plugin:
    bouncer:
      enabled: true
      logLevel: INFO
      # the mode can be "live" (default) or "stream"; choose whatever fits you
      crowdsecMode: live
      # point at the local LAPI service provided by the CrowdSec chart
      crowdsecLapiHost: "http://crowdsec-service.network.svc.cluster.local:8080"
      # the key is stored in the `crowdsec-secret` secret mounted below
      crowdsecLapiKeyFile: "/etc/crowdsec/lapi-key"
      # refresh interval for stream/cache, not critical for heartbeat
      updateIntervalSeconds: 60
